<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Northwood — Effects & Styling Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #06080f; color: #e2e8f0; -webkit-font-smoothing: antialiased; }

  .topbar { position: sticky; top: 0; z-index: 50; background: rgba(6,8,15,.92); backdrop-filter: blur(8px); border-bottom: 1px solid #1a2336; padding: 14px 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .topbar h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; margin-right: 8px; }
  .topbar h1 span { color: #8b97b0; font-weight: 500; }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }
  .tab { font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #2a3550; background: #121a2c; color: #cbd5e1; padding: 8px 14px; border-radius: 999px; transition: all .15s ease; }
  .tab:hover { border-color: #3b4a6b; color: #fff; }
  .tab.active { background: #4F46E5; border-color: #4F46E5; color: #fff; }
  .hint { font-size: 12px; color: #64748b; width: 100%; margin-top: 4px; }

  .stage { padding: 22px; max-width: 1180px; margin: 0 auto; }
  .style-page { display: none; }
  .style-page.active { display: block; }

  /* ---- Components driven by per-style CSS variables ---- */
  .surface { background: var(--page-bg); color: var(--body); border-radius: 28px; padding: clamp(22px, 3.2vw, 44px); overflow: hidden; box-shadow: 0 30px 90px -30px rgba(0,0,0,.7); }

  .head { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 14px; margin-bottom: 28px; }
  .head .title { flex: 1 1 320px; }
  .sname { font-family: var(--font-display); color: var(--heading); font-size: clamp(30px, 4.4vw, 46px); font-weight: 800; line-height: 1.04; letter-spacing: -0.02em; }
  .stag { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--accent-text); margin-bottom: 8px; }
  .verdict { font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 999px; white-space: nowrap; }
  .verdict.ok { background: #DCFCE7; color: #166534; }
  .verdict.fixed { background: #FEF3C7; color: #92400E; }
  .vibe { color: var(--body); font-size: 15px; line-height: 1.6; max-width: 68ch; margin-top: 12px; }
  .bestfor { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 72ch; margin-top: 8px; }

  .grid { display: grid; gap: 18px; margin-top: 8px; }
  .block { margin-top: 26px; }
  .block > h3 { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  .panel { background: var(--panel-bg); border: var(--panel-border); -webkit-backdrop-filter: var(--panel-backdrop); backdrop-filter: var(--panel-backdrop); box-shadow: var(--panel-shadow); border-radius: var(--panel-radius); padding: 24px; transition: transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s ease; }
  .panel.lift:hover { transform: translateY(-4px); }

  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn { font-family: var(--font-body); font-size: 14px; font-weight: 600; padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; transition: transform .15s ease, filter .15s ease, box-shadow .15s ease; }
  .btn-primary { background: var(--btn-bg); color: var(--btn-color); box-shadow: var(--btn-shadow); }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn-accent { background: var(--accent-bg); color: #fff; box-shadow: var(--btn-shadow); }
  .btn-accent:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn-ghost { background: transparent; color: var(--accent-text); border: 1.5px solid var(--accent-text); }
  .btn-ghost:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; filter: none; }
  .btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--ring-offset, #fff), 0 0 0 4px #4F46E5; }

  .cards { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent-text); }
  .ctitle { font-family: var(--font-display); color: var(--heading); font-size: 21px; font-weight: 700; margin: 8px 0; }
  .cbody { font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
  .kpi .label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
  .kpi .value { font-family: var(--font-display); font-size: 40px; font-weight: 800; color: var(--heading); font-variant-numeric: tabular-nums; line-height: 1.05; margin-top: 6px; }
  .kpi .delta { font-size: 13px; font-weight: 700; color: #16A34A; margin-top: 4px; }

  .field { max-width: 380px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--heading); margin-bottom: 6px; }
  .field input { width: 100%; font: inherit; font-size: 15px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--input-border, rgba(128,128,128,.4)); background: var(--input-bg, rgba(255,255,255,.9)); color: #0f172a; }
  .field input::placeholder { color: #64748b; }
  .field input:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,.3); }
  .field .help { font-size: 12px; color: var(--muted); margin-top: 6px; }

  table { width: 100%; border-collapse: collapse; background: var(--panel-bg); -webkit-backdrop-filter: var(--panel-backdrop); backdrop-filter: var(--panel-backdrop); border: var(--panel-border); border-radius: 14px; overflow: hidden; }
  thead th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); padding: 12px 16px; border-bottom: 1px solid rgba(128,128,128,.18); }
  tbody td { padding: 12px 16px; font-size: 14px; color: var(--body); border-top: 1px solid rgba(128,128,128,.12); }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .pill.ok { background: #DCFCE7; color: #166534; }
  .pill.warnp { background: #FEF3C7; color: #92400E; }
  .pill.dang { background: #FEE2E2; color: #991B1B; }

  .toast { display: flex; gap: 10px; align-items: flex-start; padding: 13px 16px; border-radius: 14px; border: var(--panel-border); background: var(--panel-bg); -webkit-backdrop-filter: var(--panel-backdrop); backdrop-filter: var(--panel-backdrop); box-shadow: var(--panel-shadow); margin-bottom: 10px; max-width: 460px; }
  .toast .dot { width: 10px; height: 10px; border-radius: 999px; margin-top: 5px; flex: none; }
  .toast .tt { font-size: 14px; font-weight: 700; color: var(--heading); }
  .toast .tb { font-size: 13px; color: var(--muted); }

  .meta-foot { margin-top: 26px; display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); }
  .meta-card { background: var(--panel-bg); border: var(--panel-border); border-radius: 14px; padding: 16px; }
  .meta-card b { color: var(--heading); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .meta-card p { color: var(--muted); font-size: 13px; line-height: 1.55; margin-top: 6px; }
</style>
</head>
<body>

<header class="topbar">
  <h1>Northwood <span>· Effects &amp; Styling Gallery</span></h1>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-target="s-glass">Glassmorphism</button>
    <button class="tab" data-target="s-aurora">Aurora Mesh</button>
    <button class="tab" data-target="s-bento">Bento Grid</button>

    <button class="tab" data-target="s-neon">Dark Neon</button>
    <button class="tab" data-target="s-clay">Claymorphism</button>
  </nav>
  <p class="hint">Six effect-forward treatments of the Bright Horizon brand — click to view 1 by 1. All accessibility-audited; ⚠→✅ = a contrast fix was applied.</p>
</header>

<main class="stage">

  <section class="style-page" id="s-aurora"></section>

  <section class="style-page" id="s-soft"></section>

// Apply each style's CSS variables + render
Object.keys(STYLES).forEach(id => {
  const el = document.getElementById(id);
  const c = STYLES[id].css;
  const set = (k, v) => el.style.setProperty(k, v);
  set('--page-bg', c.pageBg); set('--heading', c.heading); set('--body', c.body); set('--muted', c.muted);
  set('--panel-bg', c.panelBg); set('--panel-border', c.panelBorder); set('--panel-backdrop', c.panelBackdrop);
  set('--panel-shadow', c.panelShadow); set('--panel-radius', c.panelRadius);
  set('--btn-bg', c.btnBg); set('--btn-color', c.btnColor); set('--btn-shadow', c.btnShadow);
  set('--accent-bg', c.accentBg); set('--accent-text', c.accentText);
  set('--input-bg', c.inputBg); set('--input-border', c.inputBorder);
  set('--ring-offset', STYLES[id].ringOffset);
  set('--font-display', "'" + STYLES[id].fonts.display + "'");
  set('--font-body', "'" + STYLES[id].fonts.body + "'");
  el.innerHTML = render(id);
});

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab'); if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.style-page').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.target).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
